spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dreamlit}
    username: ${SPRING_DATASOURCE_USERNAME:dreamlit}
    password: ${SPRING_DATASOURCE_PASSWORD:dreamlit}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-256-bits-long!!}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
  url: ${APP_URL:http://localhost:4200}
  api-url: ${API_URL:http://localhost:8080}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001

openai:
  api-key: ${OPENAI_API_KEY:}
  tts-model: tts-1

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-id: ${STRIPE_PRICE_ID:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${FROM_EMAIL:hello@dreamlit.ee}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

audio:
  storage-path: ${AUDIO_STORAGE_PATH:/data/audio}
